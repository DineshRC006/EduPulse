<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduPulse</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0f1a;
  --sidebar: #13142a;
  --card-bg: #1a1c35;
  --card-border: rgba(255,255,255,0.07);
  --accent: #7c6ef7;
  --accent2: #e066a0;
  --accent3: #38d9b2;
  --text: #eeeef5;
  --muted: #8889a8;
  --high: #ff5f7e;
  --medium: #f9a825;
  --low: #38d9b2;
  --radius: 16px;
  --font-display: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  display: flex;
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
  width: 240px;
  min-height: 100vh;
  background: var(--sidebar);
  border-right: 1px solid var(--card-border);
  display: flex;
  flex-direction: column;
  padding: 32px 20px;
  gap: 8px;
  position: relative;
  overflow: hidden;
}

.sidebar::before {
  content: '';
  position: absolute;
  top: -80px; left: -60px;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(124,110,247,0.2) 0%, transparent 70%);
  pointer-events: none;
}

.logo {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--text);
  padding: 0 12px 28px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  flex-shrink: 0;
  box-shadow: 0 0 10px rgba(124,110,247,0.7);
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 14px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  color: var(--muted);
  transition: all 0.2s ease;
  letter-spacing: 0.2px;
}

.nav-item:hover, .nav-item.active {
  background: rgba(124,110,247,0.15);
  color: var(--text);
}

.nav-item.active { color: var(--accent); }

.nav-icon {
  width: 18px; height: 18px;
  opacity: 0.7;
  transition: opacity 0.2s;
}
.nav-item:hover .nav-icon, .nav-item.active .nav-icon { opacity: 1; }

.sidebar-bottom {
  margin-top: auto;
  padding: 16px 14px;
  background: rgba(124,110,247,0.1);
  border-radius: 12px;
  font-size: 12px;
  color: var(--muted);
}
.sidebar-bottom span { display: block; color: var(--text); font-weight: 600; font-size: 13px; margin-bottom: 2px; }

/* ── Main ── */
.main {
  flex: 1;
  overflow-y: auto;
  padding: 36px 40px;
  display: flex;
  flex-direction: column;
  gap: 28px;
}

.main::-webkit-scrollbar { width: 6px; }
.main::-webkit-scrollbar-track { background: transparent; }
.main::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

/* ── Header ── */
.header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.header h1 {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

.header p {
  font-size: 13px;
  color: var(--muted);
  margin-top: 4px;
  font-weight: 300;
}

.date-badge {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  padding: 8px 16px;
  border-radius: 100px;
  font-size: 13px;
  color: var(--muted);
  font-weight: 400;
}

/* ── Stat Cards ── */
.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

.stat-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 22px 24px;
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.4s ease both;
}

.stat-card::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 80px; height: 80px;
  border-radius: 0 var(--radius) 0 100%;
  opacity: 0.12;
}

.stat-card.s1::after { background: var(--accent); }
.stat-card.s2::after { background: var(--low); }
.stat-card.s3::after { background: var(--accent2); }

.stat-label {
  font-size: 12px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 500;
  margin-bottom: 10px;
}

.stat-value {
  font-family: var(--font-display);
  font-size: 38px;
  font-weight: 800;
  line-height: 1;
}

.stat-card.s1 .stat-value { color: var(--accent); }
.stat-card.s2 .stat-value { color: var(--low); }
.stat-card.s3 .stat-value { color: var(--accent2); }

.progress-bar {
  margin-top: 12px;
  height: 4px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
}

/* ── Layout Grid ── */
.grid {
  display: grid;
  grid-template-columns: 1fr 360px;
  gap: 24px;
  align-items: start;
}

/* ── Form ── */
.panel {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 28px;
}

.panel-title {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.panel-title::before {
  content: '';
  width: 4px; height: 18px;
  background: linear-gradient(to bottom, var(--accent), var(--accent2));
  border-radius: 2px;
  flex-shrink: 0;
}

.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 14px;
}

label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
}

input, select, textarea {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--card-border);
  color: var(--text);
  padding: 11px 14px;
  border-radius: 10px;
  font-family: var(--font-body);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  width: 100%;
}

input:focus, select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(124,110,247,0.15);
}

select option { background: #1a1c35; color: var(--text); }

input::placeholder { color: rgba(255,255,255,0.2); }

.add-btn {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, var(--accent), #5b50d6);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: opacity 0.2s, transform 0.15s;
  margin-top: 4px;
}

.add-btn:hover { opacity: 0.9; transform: translateY(-1px); }
.add-btn:active { transform: translateY(0); }

/* ── Task List ── */
.task-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.task-header .panel-title { margin-bottom: 0; }

.filter-tabs {
  display: flex;
  gap: 4px;
}

.tab {
  padding: 5px 12px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid transparent;
  color: var(--muted);
  transition: all 0.2s;
}

.tab.active, .tab:hover {
  background: rgba(124,110,247,0.15);
  color: var(--text);
  border-color: rgba(124,110,247,0.3);
}

/* ── Task Card ── */
.task-list { display: flex; flex-direction: column; gap: 12px; }

.task-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  padding: 16px 18px;
  display: flex;
  align-items: flex-start;
  gap: 14px;
  transition: border-color 0.2s, background 0.2s, transform 0.2s;
  animation: fadeIn 0.3s ease both;
}

.task-card:hover {
  background: rgba(255,255,255,0.05);
  border-color: rgba(255,255,255,0.12);
  transform: translateX(2px);
}

.task-card.done {
  opacity: 0.45;
}

.check-btn {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px solid var(--muted);
  cursor: pointer;
  flex-shrink: 0;
  margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  background: transparent;
  padding: 0;
}

.check-btn:hover { border-color: var(--low); background: rgba(56,217,178,0.1); }
.task-card.done .check-btn { border-color: var(--low); background: var(--low); }

.check-btn svg { display: none; }
.task-card.done .check-btn svg { display: block; }

.task-body { flex: 1; min-width: 0; }

.task-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.task-card.done .task-title { text-decoration: line-through; color: var(--muted); }

.task-desc {
  font-size: 12px;
  color: var(--muted);
  font-weight: 300;
  margin-bottom: 8px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.task-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.badge {
  padding: 3px 9px;
  border-radius: 100px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.badge.high { background: rgba(255,95,126,0.15); color: var(--high); }
.badge.medium { background: rgba(249,168,37,0.15); color: var(--medium); }
.badge.low { background: rgba(56,217,178,0.15); color: var(--low); }

.deadline {
  font-size: 11px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 4px;
}

.del-btn {
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 6px;
  border-radius: 8px;
  color: var(--muted);
  transition: all 0.2s;
  flex-shrink: 0;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
}

.del-btn:hover { background: rgba(255,95,126,0.15); color: var(--high); }

.empty-state {
  text-align: center;
  padding: 40px;
  color: var(--muted);
}

.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; line-height: 1.6; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
.stats .stat-card:nth-child(2) { animation-delay: 0.08s; }
.stats .stat-card:nth-child(3) { animation-delay: 0.16s; }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="logo">
    <div class="logo-dot"></div>
    EduPulse
  </div>

  <div class="nav-item active">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Dashboard
  </div>

  <div class="nav-item">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2"/></svg>
    Tasks
  </div>

  <div class="nav-item">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Analytics
  </div>

  <div class="sidebar-bottom">
    <span>Study Streak</span>
    🔥 &nbsp;7 days in a row
  </div>
</div>

<!-- Main -->
<div class="main">

  <!-- Header -->
  <div class="header">
    <div>
      <h1>Task Dashboard</h1>
      <p>Track your assignments &amp; stay ahead.</p>
    </div>
    <div class="date-badge" id="dateBadge"></div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card s1">
      <div class="stat-label">Total Tasks</div>
      <div class="stat-value" id="statTotal">0</div>
      <div class="progress-bar"><div class="progress-fill" id="progBar" style="width:0%"></div></div>
    </div>
    <div class="stat-card s2">
      <div class="stat-label">Completed</div>
      <div class="stat-value" id="statDone">0</div>
    </div>
    <div class="stat-card s3">
      <div class="stat-label">Pending</div>
      <div class="stat-value" id="statPending">0</div>
    </div>
  </div>

  <!-- Grid -->
  <div class="grid">

    <!-- Task List -->
    <div class="panel">
      <div class="task-header">
        <div class="panel-title">All Tasks</div>
        <div class="filter-tabs">
          <div class="tab active" onclick="setFilter('all',this)">All</div>
          <div class="tab" onclick="setFilter('pending',this)">Pending</div>
          <div class="tab" onclick="setFilter('done',this)">Done</div>
        </div>
      </div>
      <div class="task-list" id="taskList">
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <p>No tasks yet.<br>Add one to get started!</p>
        </div>
      </div>
    </div>

    <!-- Add Task Form -->
    <div class="panel">
      <div class="panel-title">Add New Task</div>

      <div class="field">
        <label>Title</label>
        <input id="title" placeholder="e.g. Math Assignment">
      </div>

      <div class="field">
        <label>Description</label>
        <input id="desc" placeholder="Short note (optional)">
      </div>

      <div class="field">
        <label>Deadline</label>
        <input id="deadline" type="date">
      </div>

      <div class="field">
        <label>Priority</label>
        <select id="priority">
          <option value="High">🔴 High Priority</option>
          <option value="Medium">🟡 Medium Priority</option>
          <option value="Low">🟢 Low Priority</option>
        </select>
      </div>

      <button class="add-btn" onclick="addTask()">+ Add Task</button>
    </div>
  </div>

</div>

<script>
let tasks = [];
let activeFilter = 'all';

// Date badge
const d = new Date();
document.getElementById('dateBadge').textContent =
  d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' });

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function addTask() {
  const title = document.getElementById('title').value.trim();
  const deadline = document.getElementById('deadline').value;
  if (!title || !deadline) { shake(); return; }

  tasks.unshift({
    id: Date.now(),
    title,
    desc: document.getElementById('desc').value.trim(),
    deadline,
    priority: document.getElementById('priority').value,
    done: false
  });

  document.getElementById('title').value = '';
  document.getElementById('desc').value = '';
  document.getElementById('deadline').value = '';
  render();
}

function shake() {
  const b = document.querySelector('.add-btn');
  b.style.animation = 'none';
  b.style.transform = 'translateX(-6px)';
  setTimeout(() => { b.style.transform = 'translateX(6px)'; }, 80);
  setTimeout(() => { b.style.transform = 'none'; }, 160);
}

function toggleDone(id) {
  tasks = tasks.map(t => t.id === id ? {...t, done: !t.done} : t);
  render();
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  render();
}

function render() {
  const list = document.getElementById('taskList');
  const done = tasks.filter(t => t.done).length;
  const total = tasks.length;

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statPending').textContent = total - done;
  document.getElementById('progBar').style.width = total ? (done/total*100)+'%' : '0%';

  let filtered = tasks;
  if (activeFilter === 'pending') filtered = tasks.filter(t => !t.done);
  if (activeFilter === 'done') filtered = tasks.filter(t => t.done);

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">✨</div><p>Nothing here yet!</p></div>`;
    return;
  }

  list.innerHTML = '';
  filtered.forEach(t => {
    const card = document.createElement('div');
    card.className = 'task-card' + (t.done ? ' done' : '');
    const dl = new Date(t.deadline + 'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    card.innerHTML = `
      <button class="check-btn" onclick="toggleDone(${t.id})">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polyline points="2,6 5,9 10,3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="task-body">
        <div class="task-title">${t.title}</div>
        ${t.desc ? `<div class="task-desc">${t.desc}</div>` : ''}
        <div class="task-meta">
          <span class="badge ${t.priority.toLowerCase()}">${t.priority}</span>
          <span class="deadline">📅 ${dl}</span>
        </div>
      </div>
      <button class="del-btn" onclick="deleteTask(${t.id})">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button>
    `;
    list.appendChild(card);
  });
}

render();
</script>
</body>
</html>
